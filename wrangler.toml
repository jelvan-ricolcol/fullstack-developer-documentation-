name = "devpilot-api"
main = "worker/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm run build"

# Secrets (set via `wrangler secret put`):
#   GITHUB_TOKEN  — optional server-side GitHub PAT
#   CF_TOKEN      — optional server-side Cloudflare API token
#   CF_ACCOUNT_ID — Cloudflare account ID

# [[kv_namespaces]]
# binding = "CACHE"
# id = "your-kv-namespace-id"

[env.production]
name = "devpilot-api"

[env.preview]
name = "devpilot-api-preview"
